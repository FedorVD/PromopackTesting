<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Расшифровки действий</title>
    <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <div th:replace="~{admin/_fragments :: layout(title='Расшифровки действий', username=${username}, message=${message}, error=${error})}">
    </div>
</head>
<body>

<div th:fragment="content-body">
    <h3>Расшифровки действий</h3>

    <!-- Форма фильтрации -->
    <div class="filter-form">
        <form method="get" th:action="@{/admin/onboarding/references/activityDetails}" class="form">
            <div class="filter-row">
                <div class="form-group">
                    <label for="activityId">Выберите действие:</label>
                    <select id="activityId" name="activityId" class="form-select">
                        <option value="">Все действия</option>
                        <option th:each="activity : ${activities}"
                                th:value="${activity.id}"
                                th:text="${activity.activityName}"
                                th:selected="${activityId == activity.id}"></option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Применить фильтр</button>
                    <a href="#" th:href="@{/admin/onboarding/references/activityDetails}" class="btn btn-secondary">Сбросить</a>
                </div>
            </div>
        </form>
    </div>

    <!-- Кнопка добавления -->
    <div class="toolbar">
        <a href="#" th:href="@{/admin/onboarding/references/add-activityDetails}" class="btn">Добавить расшифровку</a>
    </div>

    <!-- Таблица расшифровок -->
    <div class="table-container">
        <table class="data-table" style="table-layout: fixed;">
            <thead>
            <tr>
                <th style="width: 30%;">Наименование расшифровки</th>
                <th style="width: 30%;">Действие</th>
                <th style="width: 20%;">Роль</th>
                <th style="width: 15%; text-align: right;">Действия</th>
            </tr>
            </thead>
        </table>
        <div class="table-body">
            <table class="data-table" style="table-layout: fixed;">
                <tbody>
                <tr th:each="detail : ${activityDetails}">
                    <td style="width: 30%;" th:text="${detail.activityDetailsName}">Наименование расшифровки</td>
                    <td style="width: 30%;" th:text="${detail.activity.activityName}">Действие</td>
                    <td style="width: 20%;" th:text="${detail.onboardingRole.roleName}">Роль</td>
                    <td style="width: 15%; text-align: right;">
                        <a href="#"
                           th:href="@{'/admin/onboarding/references/' + ${detail.id} + '/edit-activityDetails'}"
                           class="btn btn-sm">Редактировать</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Пустое состояние -->
    <div th:if="${#lists.isEmpty(activityDetails)}" class="empty-state">
        <p>Список расшифровок пуст. <a href="#" th:href="@{/admin/onboarding/references/add-activityDetails}">Добавьте первую расшифровку</a>.</p>
    </div>

    <!-- Ссылка на возврат -->
    <div class="back-link">
        <a href="#" th:href="@{/admin/onboarding/references}">&larr; Вернуться к списку справочников</a>
    </div>
</div>

</body>
</html>
