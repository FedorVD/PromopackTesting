<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Добавить нормативный документ</title>
    <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <div th:replace="~{admin/_fragments :: layout(title='Добавить документ', username=${username}, message=${message}, error=${error})}">
    </div>
</head>

<body>
<div th:fragment="content-body">
    <h3>Добавление нового нормативного документа</h3>
    <p>Заполните форму для добавления нового документа в справочник.</p>

    <!-- Форма добавления -->
    <form method="post" th:action="@{/admin/onboarding/references/add-regulatoryDoc}" class="form" enctype="multipart/form-data">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />

        <div class="form-group">
            <label for="docName">Наименование документа</label>
            <input type="text"
                   id="docName"
                   name="docName"
                   class="form-input"
                   placeholder="Введите название документа"
                   required
                   autofocus />
        </div>

        <div class="form-group">
            <label for="docPath">Полный путь к файлу (например: \\SERVER\Share\file.pdf)</label>
            <input type="text"
                   id="docPath"
                   name="docPath"
                   class="form-input"
                   placeholder="\\сервер\папка\документ.pdf"
                   required />
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-save">Сохранить</button>
            <a href="#" th:href="@{/admin/onboarding/references/regulatoryDocs}" class="btn btn-cancel">Отмена</a>
        </div>
    </form>

    <!-- Ссылка на возврат к списку -->
    <div class="back-link">
        <a href="#" th:href="@{/admin/onboarding/references/regulatoryDocs}">&larr; Вернуться к списку документов</a>
    </div>
</div>

<script>
    document.getElementById('file').addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
            const fileURL = URL.createObjectURL(file);
            const fileName = document.getElementById('fileName');
            const filePreview = document.getElementById('filePreview');
            const filePreviewContainer = document.getElementById('filePreviewContainer');

            fileName.textContent = 'Выбран файл: ' + file.name;
            filePreviewContainer.style.display = 'block';

            // Для PDF и текстовых файлов — показываем предпросмотр
            if (file.type === 'application/pdf') {
                filePreview.src = fileURL;
            } else if (file.type.startsWith('text/')) {
                fetch(fileURL)
                    .then(res => res.text())
                    .then(text => {
                        filePreview.srcdoc = '<pre style="padding:15px; background:#fff; font-family:monospace;">' + text + '</pre>';
                    });
            } else {
                filePreview.srcdoc = '<p style="text-align:center; padding:20px;">Предпросмотр недоступен для этого формата</p>';
            }
        }
    });
</script>

</body>
</html>
