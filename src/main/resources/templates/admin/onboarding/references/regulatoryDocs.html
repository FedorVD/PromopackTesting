<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Нормативные документы</title>
    <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <div th:replace="~{admin/_fragments :: layout(title='Справочник нормативных документов', username=${username}, message=${message}, error=${error})}">
    </div>
</head>
<body>

    <div th:fragment="content-body">
        <h3>Нормативные документы</h3>

        <!-- Кнопка добавления -->
        <div class="toolbar">
            <a href="#" th:href="@{/admin/onboarding/references/add-regulatoryDoc}" class="btn">Добавить документ</a>
        </div>

        <!-- Таблица документов -->
        <div class="table-container">
            <table class="data-table" style="table-layout: fixed;">
                <thead>
                <tr>
                    <th style="width: 15%;">№ п/п</th>
                    <th style="width: 50%;">Наименование документа</th>
                    <th style="width: 25%;">Ссылка</th>
                    <th style="width: 10%; text-align: right;">Действия</th>
                </tr>
                </thead>
            </table>
            <div class="table-body">
                <table class="data-table" style="table-layout: fixed;">
                    <tbody>
                    <tr th:each="doc : ${regulatoryDocs}">
                        <td style="width: 15%;" th:text="${doc.id}">1</td>
                        <td style="width: 50%;" th:text="${doc.docName}">Инструкция по охране труда</td>
                        <td style="width: 25%;">
                            <a th:href="@{'/admin/onboarding/references/download-doc/' + ${doc.id}}"
                               class="btn btn-sm">Открыть</a>
                        </td>
                        <td style="width: 10%; text-align: right;">
                            <a href="#"
                               th:href="@{'/admin/onboarding/references/' + ${doc.id} + '/edit-regulatoryDoc'}"
                               class="btn btn-sm">Редактировать</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Пустое состояние -->
        <div th:if="${#lists.isEmpty(regulatoryDocs)}" class="empty-state">
            <p>Список документов пуст. <a href="#" th:href="@{/admin/onboarding/references/add-regulatoryDoc}">Добавьте первый документ</a>.</p>
        </div>

        <!-- Ссылка на возврат -->
        <div class="back-link">
            <a href="#" th:href="@{/admin/onboarding/references}">&larr; Вернуться к списку справочников</a>
        </div>
    </div>

</body>
</html>
