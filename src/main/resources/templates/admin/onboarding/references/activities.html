<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Справочник действий</title>
    <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <div th:replace="~{admin/_fragments :: layout(title='Справочник действий', username=${username}, message=${message}, error=${error})}">
    </div>
</head>
<body>

<div th:fragment="content-body">
    <h3>Справочник действий</h3>

    <!-- Кнопка добавления -->
    <div class="toolbar">
        <a href="#" th:href="@{/admin/onboarding/references/add-activity}" class="btn">Добавить действие</a>
    </div>

    <!-- Таблица действий -->
    <div class="table-container">
        <table class="data-table" style="table-layout: fixed;">
            <thead>
            <tr>
                <th style="width: 15%;">№ п/п</th>
                <th style="width: 70%;">Наименование действия</th>
                <th style="width: 15%; text-align: right;">Действия</th>
            </tr>
            </thead>
        </table>
        <div class="table-body">
            <table class="data-table" style="table-layout: fixed;">
                <tbody>
                <tr th:each="activity : ${activities}">
                    <td style="width: 15%;" th:text="${activity.id}">1</td>
                    <td style="width: 70%;" th:text="${activity.activityName}">Приемка на работу</td>
                    <td style="width: 15%; text-align: right;">
                        <a href="#"
                           th:href="@{'/admin/onboarding/references/' + ${activity.id} + '/edit-activity'}"
                           class="btn btn-sm">Редактировать</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Пустое состояние -->
    <div th:if="${#lists.isEmpty(activities)}" class="empty-state">
        <p>Список действий пуст. <a href="#" th:href="@{/admin/onboarding/references/add-activity}">Добавьте первое действие</a>.</p>
    </div>

    <!-- Ссылка на возврат -->
    <div class="back-link">
        <a href="#" th:href="@{/admin/onboarding/references}">&larr; Вернуться к списку справочников</a>
    </div>
</div>

</body>
</html>
