<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Добавить расшифровку действия</title>
    <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <div th:replace="~{admin/_fragments :: layout(title='Добавить расшифровку', username=${username}, message=${message}, error=${error})}">
    </div>
</head>
<body>

<div th:fragment="content-body">
    <h3>Добавление новой расшифровки действия</h3>
    <p>Заполните форму для добавления новой расшифровки.</p>

    <!-- Форма добавления -->
    <form method="post" th:action="@{/admin/onboarding/references/add-activityDetails}" class="form">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />

        <div class="form-group">
            <label for="name">Наименование расшифровки</label>
            <input type="text"
                   id="name"
                   name="name"
                   class="form-input"
                   placeholder="Введите наименование расшифровки"
                   required
                   autofocus />
        </div>

        <div class="form-group">
            <label for="activityId">Действие</label>
            <select id="activityId" name="activityId" class="form-select" required>
                <option value="">Выберите действие</option>
                <option th:each="activity : ${activities}"
                        th:value="${activity.id}"
                        th:text="${activity.activityName}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="onboardingRoleId">Роль в адаптации</label>
            <select id="onboardingRoleId" name="OnboardingRoleId" class="form-select" required>
                <option value="">Выберите роль</option>
                <option th:each="role : ${onboardingRoles}"
                        th:value="${role.id}"
                        th:text="${role.roleName}"></option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-save">Сохранить</button>
            <a href="#" th:href="@{/admin/onboarding/references/activityDetails}" class="btn btn-cancel">Отмена</a>
        </div>
    </form>

    <!-- Ссылка на возврат -->
    <div class="back-link">
        <a href="#" th:href="@{/admin/onboarding/references/activityDetails}">&larr; Вернуться к списку расшифровок</a>
    </div>
</div>

</body>
</html>
