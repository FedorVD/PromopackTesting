<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Редактирование действия</title>
    <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <div th:replace="~{admin/_fragments :: layout(title='Редактирование действия', username=${username}, message=${message}, error=${error})}">
    </div>
</head>
<body>

<div th:fragment="content-body">
    <h3>Редактирование действия</h3>
    <p>Измените наименование действия.</p>

    <!-- Форма редактирования -->
    <form method="post" th:action="@{'/admin/onboarding/references/' + ${activity.id} + '/edit-activity'}" class="form">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
        <input type="hidden" name="activityId" th:value="${activity.id}" />

        <div class="form-group">
            <label for="name">Наименование действия</label>
            <input type="text"
                   id="name"
                   name="name"
                   class="form-input"
                   th:value="${activity.activityName}"
                   required
                   autofocus />
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-save">Сохранить изменения</button>
            <a href="#" th:href="@{/admin/onboarding/references/activities}" class="btn btn-cancel">Отмена</a>
        </div>
    </form>

    <!-- Ссылка на возврат -->
    <div class="back-link">
        <a href="#" th:href="@{/admin/onboarding/references/activities}">&larr; Вернуться к списку действий</a>
    </div>
</div>

</body>
</html>
