<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title th:inline="text">[[${title}]]</title>
  <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>

<div th:fragment="layout(title, username, message, error)">
  <!-- Верхняя часть страницы -->
  <header>
    <h1>Административная панель</h1>
    <p>Вы вошли как: <strong th:text="${username}">Username</strong></p>
  </header>

  <!-- Навигационное меню -->
  <div class="nav-menu">
    <a href="/admin/onboarding">Адаптация сотрудников</a>
    <a href="/admin/testing">Тестирование</a>
    <a href="/admin/users/users">Управление пользователями</a>
    <a href="#" class="logout-link">Выйти</a>
  </div>

  <!-- Сообщения -->
  <div th:if="${message}" class="message success">
    <p th:text="${message}">Сообщение</p>
  </div>

  <div th:if="${error}" class="message error">
    <p th:text="${error}">Ошибка</p>
  </div>

  <!-- Форма для выхода -->
  <form id="logout-form" action="/logout" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
  </form>
</div>

<script src="/js/logout.js" defer></script>

</body>
</html>
