<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title th:inline="text">[[${title}]]</title>
  <link rel="icon" href="/promopack_logo.ico" type="image/x-icon">
  <link rel="stylesheet" th:href="@{/css/styles.css}" />

</head>
<body>

<!-- Верхняя часть страницы -->
<header>
  <h1>Административная панель</h1>
  <p>Вы вошли как: <strong th:text="${username}">Username</strong></p>
</header>

<!-- Навигационное меню -->
<div class="nav-menu">
  <a href="/admin/onboarding/onboarding">Адаптация сотрудников</a>
  <a href="/admin/tests/testing">Тестрование</a>
  <a href="/admin/users/users">Управление пользователями</a>
  <span class="logout-link">Выйти</span>
</div>

<!-- Сообщения -->
<div th:if="${message}" style="color: green;">
  <p th:text="${message}">Сообщение</p>
</div>

<div th:if="${error}" style="color: red;">
  <p th:text="${error}">Ошибка</p>
</div>

<div th:fragment="layout(title, username, message, error)">

  <h1 th:text="${title}">Заголовок</h1>
  <p>Вы вошли как: <strong th:text="${username}">Username</strong></p>

  <div class="nav-menu">
    <a href="/admin/onboarding/onboarding">Адаптация сотрудников</a>
    <a href="/admin/testing/testing">Тестирование</a>
    <a href="/admin/users/users">Управление пользователями</a>
    <span class="logout-link">Выйти</span>
  </div>

  <form id="logout-form" method="post" action="/logout" style="display: none;">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />
  </form>

  <div th:if="${message}" style="color: green;">
    <p th:text="${message}">Сообщение</p>
  </div>

  <div th:if="${error}" style="color: red;">
    <p th:text="${error}">Ошибка</p>
  </div>
</div>

<script src="/js/logout.js" defer></script>

</body>
</html>
